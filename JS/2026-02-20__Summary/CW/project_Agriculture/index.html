<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Yellowtail&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Agriculture</title>
</head>

<body>
    <header class="header">
        <div class="header__logo">
            <img src="./images/Logo.svg" alt="">
        </div>
        <div class="header__nav">
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Pages</li>
                <li>Shop</li>
                <li>Projects</li>
                <li>News</li>
            </ul>
        </div>
        <div class="header__action">
            <div class="search">
                <input type="text">
                <div class="wrap-img">
                    <img src="./images/Search_Icon.svg" alt="">
                </div>
            </div>
            <div class="cart">
                <div class="wrap-img">
                    <img src="./images/Cart_Icon.svg" alt="">
                </div>
                <span>Cart (0)</span>
            </div>
        </div>

    </header>
    <main class="main">
        <section class="banner">
            <div class="banner__container">
                <span>100% Natural Food</span>
                <h2>Choose the best
                    healthier way
                    of life</h2>
                <button>Explore Now</button>
            </div>
        </section>
        <section class="offer-banner"></section>
        <section class="about-us"></section>

    </main>

    <script src="./script.js"></script>
</body>

</html>
