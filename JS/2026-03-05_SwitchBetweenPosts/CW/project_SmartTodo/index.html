<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="./styles/style.css"/>
    <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <title>Document</title>
</head>
<body>
<div class="container">
    <div class="search-field">
        <input type="text" class="search-field__input" placeholder="Поиск" oninput="filterTodos(this.value)"/>
        <span class="search-field__icon material-symbols-rounded">
          search
        </span>
    </div>
    <div class="split-button">
        <button
                class="split-button__button split-button__button--active"
                id="filter-all"
<!--                onclick="splitButtonClickHandler(this)"-->
        >
          <span class="material-symbols-rounded split-button__button-icon">
            check
          </span>
            Все
        </button>
        <button
                class="split-button__button split-button__button--center"
                id="filter-active"
<!--                onclick="splitButtonClickHandler(this)"-->
        >
          <span class="material-symbols-rounded split-button__button-icon">
            check
          </span>
            Активные
        </button>
        <button
                class="split-button__button"
                id="filter-done"
<!--                onclick="splitButtonClickHandler(this)"-->
        >
          <span class="material-symbols-rounded split-button__button-icon">
            check
          </span>
            Готовые
        </button>
    </div>
    <div id="stats"></div>
    <ul class="todo-list">
    </ul>
    <form class="create-form" id="create-form">
        <input
                type="text"
                class="create-form__input"
                placeholder="Описание"
                name="description"
                id="description"
                required
        />
        <div class="error hidden">More 3</div>
        <div class="form__buttons-wrapper">
            <button class="form-button form-button--primary" type="submit">
                Add
            </button>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
