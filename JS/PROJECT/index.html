<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css" />
    <title>My study Project</title>
</head>

<body>
    <header class="header">
        <div class="left-side">
            <div class="wrap-img">
                <img src="./images/header/logo.svg" alt="logo-meetup">
            </div>

            <div class="search-menu">
                <div class="wrap-search">
                    <input class="search" type="text"
                           placeholder="Search events">
                    <div class="wrap-icon wrap-img">
                        <img src="./images/header/search-gray.svg" alt="">
                    </div>
                </div>

                <input class="state" type="text" placeholder="Mountain View, CA">
                <button class="btn">
                    <img src="./images/header/search-white.svg" alt="">
                </button>
            </div>
        </div>


        <div class="right-side">
            <button class="btn-like-text language">
                <div class="wrap-img">
                    <img src="./images/header/globus.svg" alt="globus">
                </div>
                <span>English</span>
            </button>
            <button class="btn-like-text">Log in</button>
            <button class="btn">Sign up</button>

        </div>
    </header>

    <main class="main"></main>

    <footer class="footer">уже готов</footer>

    <script src="./script.js"></script>
</body>

</html>
