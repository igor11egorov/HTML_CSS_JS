<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css" />
    <title>My study Project</title>
</head>

<body>
    <header class="header">
        <div class="header__left">
            <div class="wrap-img">
                <img src="./images/header/logo.svg" alt="logo-meetup">
            </div>
            <div class="search-menu">
                <div class="wrap-search">
                    <input class="search" type="text"
                           placeholder="Search events">
                    <div class="wrap-icon wrap-img">
                        <img src="./images/header/search-gray.svg" alt="search">
                    </div>
                </div>
                <input class="state" type="text" placeholder="Mountain View, CA">
                <button class="btn">
                    <img src="./images/header/search-white.svg" alt="search">
                </button>
            </div>
        </div>
        <div class="header__right">
            <button class="btn-like-text language">
                <div class="wrap-img">
                    <img src="./images/header/globus.svg" alt="globus">
                </div>
                <span>English</span>
            </button>
            <button class="btn-like-text">Log in</button>
            <button class="btn-green">Sign up</button>
        </div>
    </header>

    <main class="main">
        <section class="join-meetup">
            <div class="left-side">
                <h1 class="header">The people platform—Where
                    interests become friendships</h1>
                <p class="text">Whatever your interest, from hiking and reading to networking and skill sharing,
                    there are thousands of people who share it on Meetup. Events are happening
                    every day—sign up to join the fun.</p>
                <button class="btn-green">Join Meetup</button>
            </div>
            <div class="right-side wrap-img">
                <img src="./images/main/s1_JoinMeetup/tandem.svg" alt="tandem">
            </div>
        </section>
        <section class="events-near">
            <div class="header-block">
                <div class="right-side">
                    <h2 class="header">Events near</h2>
                    <div class="search">
                        <input class="state" type="text" placeholder="Mountain View, CA">
                        <button class="btn">
                            <img src="./images/main/s2_EventsNear/edit.svg" alt="">
                        </button>
                    </div>
                </div>
                <a href="" class="link">See all events</a>
            </div>
            <div class="container-cards">

            </div>

        </section>
    </main>

    <footer class="footer">уже готов</footer>

    <script src="./script.js"></script>
</body>

</html>
